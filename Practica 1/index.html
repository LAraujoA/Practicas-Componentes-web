<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Practica 1 DOM</title>
</head>
<body>
    <div class="tarjeta">
        <h3>Generador de Saludos</h3>
        <input type="text" id="nombreUsuario" placeholder="Escriba su nombre">
        <button id="btnSaludar">Saludar</button>
        <p id="mensaje" style="color: #0b3d5f"></p>
    </div>
    <div class="tarjeta">
        <h3>Ejercicio de Suscripcion</h3>
        <form id="formSucripcion">
            <label for="correoUsuario">Correo Electronico: </label>
            <input type="email" id="correoUsuario" placeholder="ejemplo@ejemplo.com" required>
            <button type="submit"> Suscribirme</button>
        </form>
        <p id="mensajeEnvio" style="color: #198754"></p>

    </div>
    <script src="script.js"></script>
</body>
</html>
